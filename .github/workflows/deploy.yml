name: Deploy Trading Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t h4ssan022557/trading-bot:latest ./app

    - name: Push Image
      run: docker push h4ssan022557/trading-bot:latest

    - name: Deploy to K3s (EC2)
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          # Pull latest image
          docker pull h4ssan022557/trading-bot:latest

          # Apply Kubernetes manifests
          kubectl apply -f ~/k8s/deployment.yaml
          kubectl apply -f ~/k8s/service.yaml

          # Restart deployment to use new image
          kubectl rollout restart deployment trading-bot

          # Wait for rollout to complete
          kubectl rollout status deployment trading-bot
